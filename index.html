<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matcha - App de Citas</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="profile-icon">
                <img src="https://i.pravatar.cc/150?img=68" alt="Mi Perfil">
            </div>
            <div class="logo">
                <i class="fa-solid fa-fire flame-icon"></i> Matcha
            </div>
            <div class="chat-icon">
                <i class="fa-solid fa-comments"></i>
                <span class="badge">3</span>
            </div>
        </header>

        <!-- Main Swipe Area -->
        <main class="swipe-area">
            <div class="card-stack" id="card-stack">
                <!-- Cards will be generated by JS -->
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <button class="control-btn no-btn" id="btn-no">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <button class="control-btn star-btn" id="btn-star">
                    <i class="fa-solid fa-star"></i>
                </button>
                <button class="control-btn yes-btn" id="btn-yes">
                    <i class="fa-solid fa-heart"></i>
                </button>
            </div>
        </main>
        
        <!-- Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active"><i class="fa-solid fa-fire"></i></button>
            <button class="nav-item"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="nav-item"><i class="fa-solid fa-star"></i></button>
            <button class="nav-item"><i class="fa-solid fa-user"></i></button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
