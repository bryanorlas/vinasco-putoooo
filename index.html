<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinder Remaster</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="profile-icon" id="my-profile-btn" style="cursor: pointer;">
                <img id="my-profile-img" src="https://i.pravatar.cc/150?img=68" alt="Mi Perfil">
            </div>
            <div class="logo">
                <i class="fa-solid fa-fire flame-icon"></i> Tinder Remaster
            </div>
            <div class="chat-icon">
                <i class="fa-solid fa-comments"></i>
                <span class="badge">3</span>
            </div>
        </header>

        <!-- Main Swipe Area -->
        <main class="swipe-area">
            <div class="card-stack" id="card-stack">
                <!-- Cards will be generated by JS -->
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <button class="control-btn no-btn" id="btn-no">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <button class="control-btn star-btn" id="btn-star">
                    <i class="fa-solid fa-star"></i>
                </button>
                <button class="control-btn yes-btn" id="btn-yes">
                    <i class="fa-solid fa-heart"></i>
                </button>
            </div>
        </main>
        
        <!-- Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active"><i class="fa-solid fa-fire"></i></button>
            <button class="nav-item" id="nav-filter-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="nav-item"><i class="fa-solid fa-star"></i></button>
            <button class="nav-item"><i class="fa-solid fa-user"></i></button>
        </nav>

        <!-- Match Confirmation Modal -->
        <div class="modal-overlay" id="match-modal">
            <div class="modal-content">
                <h3 class="modal-title">¿Seguro que quieres dar Like?</h3>
                <div class="modal-profile">
                    <img id="modal-img" src="" alt="Profile">
                    <h4 id="modal-name"></h4>
                    <p id="modal-bio"></p>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn cancel-btn" id="modal-cancel">Cancelar</button>
                    <button class="modal-btn confirm-btn" id="modal-confirm">Sí, Confirmar!</button>
                </div>
            </div>
        </div>
        <!-- Edit Profile Modal -->
        <div class="modal-overlay" id="profile-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title" style="margin-bottom: 0;">Mi Perfil</h3>
                    <button class="close-btn" id="close-profile-modal"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="profile-edit-form">
                    <div class="profile-img-container">
                        <img id="edit-profile-img" src="https://i.pravatar.cc/150?img=68" alt="Mi Perfil">
                        <label for="profile-img-upload" class="edit-img-overlay">
                            <i class="fa-solid fa-camera"></i>
                        </label>
                        <input type="file" id="profile-img-upload" accept="image/*" style="display: none;">
                    </div>
                    <div class="form-group">
                        <label for="profile-bio-input">Sobre mí</label>
                        <textarea id="profile-bio-input" rows="3" placeholder="Escribe algo sobre ti..."></textarea>
                    </div>
                    <button class="modal-btn confirm-btn" id="save-profile-btn" style="width: 100%; margin-top: 15px;">Guardar Cambios</button>
                </div>
            </div>
        </div>
        <!-- Filter Modal -->
        <div class="modal-overlay" id="filter-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title" style="margin-bottom: 0;">Filtros</h3>
                    <button class="close-btn" id="close-filter-modal"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="profile-edit-form">
                    <div class="form-group">
                        <label for="age-filter">Edad Máxima: <span id="age-value">30</span></label>
                        <input type="range" id="age-filter" min="18" max="50" value="30">
                    </div>
                    <div class="form-group">
                        <label for="interest-filter">Temática / Interés</label>
                        <input type="text" id="interest-filter" placeholder="ej. café, diseño, esquí">
                    </div>
                    <button class="modal-btn confirm-btn" id="apply-filters-btn" style="width: 100%; margin-top: 15px;">Aplicar Filtros</button>
                </div>
            </div>
        </div>
        <!-- Chat View -->
        <div class="chat-view" id="chat-view">
            <div class="chat-header">
                <button id="close-chat-btn" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></button>
                <h3>Mensajes</h3>
                <div style="width: 24px;"></div>
            </div>
            <div class="chat-content">
                <div class="chat-matches-section">
                    <h4>Nuevos Matches</h4>
                    <div class="matches-container" id="matches-container">
                        <p class="empty-text">Aún no tienes matches.</p>
                    </div>
                </div>
                <div class="chat-messages-section">
                    <h4>Mensajes Recientes</h4>
                    <div class="messages-list" id="messages-list">
                        <!-- Mensajes de los matches irán aquí -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
